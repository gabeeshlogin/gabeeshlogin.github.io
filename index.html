<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Gabeesh Portal</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700&display=swap');

    html, body {
      margin: 0; 
      padding: 0;
      height: 100%;
      font-family: 'Orbitron', sans-serif;
      background: #0d0d0d;
      overflow: hidden;
      color: #0ff;
      display: flex;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      user-select: none;
    }

    #particles-js {
      position: fixed;
      width: 100%;
      height: 100%;
      top: 0; left: 0;
      z-index: 0;
      background: #0d0d0d;
    }

    .container {
      position: relative;
      z-index: 1;
      text-align: center;
      padding: 40px 60px;
      border-radius: 20px;
      background: rgba(0, 255, 255, 0.05);
      box-shadow:
        0 0 10px #0ff,
        0 0 30px #0ff,
        0 0 60px #0ff80;
      backdrop-filter: blur(15px);
      border: 2px solid #0ff;
      max-width: 320px;
      user-select: none;
    }

    h1 {
      margin-bottom: 30px;
      font-weight: 700;
      font-size: 2.5rem;
      color: #0ff;
      text-shadow:
        0 0 5px #0ff,
        0 0 10px #0ff,
        0 0 20px #00ffff,
        0 0 30px #00ffff;
    }

    button {
      background: transparent;
      border: 3px solid #0ff;
      border-radius: 50px;
      color: #0ff;
      font-size: 1.3rem;
      padding: 15px 50px;
      cursor: pointer;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 2px;
      box-shadow:
        0 0 5px #0ff,
        0 0 15px #00ffff,
        inset 0 0 15px #00ffff;
      transition: 
        transform 0.2s ease,
        box-shadow 0.3s ease;
      user-select: none;
      outline: none;
    }

    button:hover {
      transform: scale(1.1);
      box-shadow:
        0 0 15px #0ff,
        0 0 35px #00ffff,
        inset 0 0 25px #00ffff;
    }

    button:active {
      transform: scale(0.95);
      box-shadow:
        0 0 8px #0ff,
        0 0 20px #00ffff,
        inset 0 0 10px #00ffff;
    }
  </style>
</head>
<body>

  <div id="particles-js"></div>

  <div class="container">
    <h1>Go To Gabeesh</h1>
    <button onclick="location.href='https://gabeesh.ngrok.app'">GO TO GABEESH</button>
  </div>

  <!-- particles.js library from CDN -->
  <script src="https://cdn.jsdelivr.net/npm/particles.js@2.0.0/particles.min.js"></script>
  <script>
    particlesJS("particles-js", {
      "particles": {
        "number": {
          "value": 80,
          "density": {
            "enable": true,
            "value_area": 800
          }
        },
        "color": {
          "value": "#0ff"
        },
        "shape": {
          "type": "circle"
        },
        "opacity": {
          "value": 0.5,
          "random": true,
          "anim": {
            "enable": true,
            "speed": 1.5,
            "opacity_min": 0.1,
            "sync": false
          }
        },
        "size": {
          "value": 3,
          "random": true,
          "anim": {
            "enable": false
          }
        },
        "line_linked": {
          "enable": true,
          "distance": 120,
          "color": "#0ff",
          "opacity": 0.3,
          "width": 1
        },
        "move": {
          "enable": true,
          "speed": 2,
          "direction": "none",
          "random": true,
          "straight": false,
          "out_mode": "out",
          "bounce": false
        }
      },
      "interactivity": {
        "detect_on": "canvas",
        "events": {
          "onhover": {
            "enable": true,
            "mode": "grab"
          },
          "onclick": {
            "enable": false
          },
          "resize": true
        },
        "modes": {
          "grab": {
            "distance": 150,
            "line_linked": {
              "opacity": 0.6
            }
          }
        }
      },
      "retina_detect": true
    });
  </script>
</body>
</html>
